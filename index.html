
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1=">
    <title>🚀Hackathon Finder</title>
    
    <!-- Link to our CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- ========== HEADER SECTION ========== -->
    <header class="header">
        <h1>🚀 HackHunt 💻</h1>
        <p class="tagline">🔍 Discover • 💡 Innovate • 🏆 Compete</p>
    </header>

    <!-- ========== SEARCH SECTION ========== -->
    <section class="search-section">
        <div class="search-container">
            <!-- Search Input -->
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search by state, city, or college name..."
                >
            </div>
            
            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="online">🌐 Online</button>
                <button class="filter-btn" data-filter="offline">🏢 Offline</button>
                <button class="filter-btn" data-filter="favorites">⭐ Favorites</button>
            </div>
        </div>
    </section>

    <!-- ========== STATS SECTION ========== -->
    <section class="stats-section">
        <div class="stat-card">
            <span class="stat-number" id="totalHackathons">0</span>
            <span class="stat-label">Total Hackathons</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="upcomingCount">0</span>
            <span class="stat-label">Upcoming Events</span>
        </div>
        <div class="stat-card">
            <span class="stat-number" id="favoritesCount">0</span>
            <span class="stat-label">Your Favorites</span>
        </div>
    </section>

    <!-- ========== HACKATHON CARDS SECTION ========== -->
    <main class="main-content">
        <div class="cards-container" id="cardsContainer">
            <!-- Hackathon cards will be inserted here by JavaScript -->
        </div>
        
        <!-- Message when no results found -->
        <div class="no-results" id="noResults">
            <span class="no-results-icon">😕</span>
            <h3>No hackathons found</h3>
            <p>Try a different search term or filter</p>
        </div>
    </main>

    <!-- ========== FOOTER SECTION ========== -->
    <footer class="footer">
        <p>Made with ❤️ for College Students</p>
        <p>© 2025 Hackathon Finder</p>
    </footer>

    <!-- Link to our JavaScript files -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
